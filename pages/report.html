<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Road Damage Report</title>

    <link rel="stylesheet"
          href="../assets/css/style.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>

<body>

    <nav class="navbar">

        <div class="logo">

            <i class="fa-solid fa-shield-halved"></i>

            <div>

                <h2>Cyber Resilient IoT Platform</h2>

                <small>Road Damage Monitoring</small>

            </div>

        </div>

    </nav>

    <section class="hero">

        <div>

            <h1 id="location"></h1>

            <p id="date"></p>

        </div>

    </section>

    <section
        style="
        max-width:1200px;
        margin:30px auto;
        background:#fff;
        border-radius:20px;
        padding:30px;
        box-shadow:0 8px 20px rgba(0,0,0,.1);
        ">

        <div id="imageContainer"></div>

        <br>

        <h2>Description</h2>

        <p id="description"></p>

        <br>

        <h2>Severity</h2>

        <span
            id="severity"
            class="badge">
        </span>

        <br><br>

        <h2>Status</h2>

        <p id="status"></p>

        <br>

        <h2>Assigned Officer</h2>

        <p id="officer"></p>

        <br>

        <div id="completionSection">

            <h2>Completion Date</h2>

            <p id="completion"></p>

            <br>

        </div>

        <h2>Location</h2>

        <iframe
            id="map"
            width="100%"
            height="450"
            style="border:0;border-radius:15px;"
            loading="lazy">
        </iframe>

        <br><br>

        <a
            href="../index.html"
            class="view-btn">

            <i class="fa-solid fa-arrow-left"></i>

            Back to Dashboard

        </a>

    </section>

    <script src="../data/reports.js"></script>

    <script>

        const params = new URLSearchParams(window.location.search);

        const id = Number(params.get("id"));

        const report = reports.find(r => r.id === id);

        if(report)
        {
            document.getElementById("location").innerHTML =
            report.location;

            document.getElementById("date").innerHTML =
            "Reported On : " + report.date;

            document.getElementById("description").innerHTML =
            report.description;

            document.getElementById("status").innerHTML =
            report.status;

            document.getElementById("officer").innerHTML =
            report.officer;

            const severity =
            document.getElementById("severity");

            severity.innerHTML =
            report.severity;

            severity.classList.add(
            report.severity.toLowerCase());

            if(report.status === "Resolved")
            {
                document.getElementById("completion").innerHTML =
                report.completion;

                document.getElementById("imageContainer").innerHTML =
                `
                <h2>Before Repair</h2>

                <img
                    src="../${report.beforeImage}"
                    style="
                    width:100%;
                    height:420px;
                    object-fit:cover;
                    border-radius:15px;">

                <br><br>

                <h2>After Repair</h2>

                <img
                    src="../${report.afterImage}"
                    style="
                    width:100%;
                    height:420px;
                    object-fit:cover;
                    border-radius:15px;">
                `;
            }
            else
            {
                document.getElementById("completionSection").style.display =
                "none";

                document.getElementById("imageContainer").innerHTML =
                `
                <img
                    src="../${report.image}"
                    style="
                    width:100%;
                    height:500px;
                    object-fit:cover;
                    border-radius:15px;">
                `;
            }

            document.getElementById("map").src =
            "https://maps.google.com/maps?q=" +
            report.lat +
            "," +
            report.lng +
            "&z=17&output=embed";
        }

    </script>

</body>

</html>
